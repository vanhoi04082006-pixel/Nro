<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập - Ngọc Rồng SV4</title>
  <style>
    body {
      font-family: 'Exo 2', Arial, sans-serif;
      background: linear-gradient(135deg, #04142b, #0a4fa3);
      color: #cde4ff;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: rgba(10, 79, 163, 0.3);
      border: 1px solid #4db8ff;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 30px rgba(77, 184, 255, 0.3);
      backdrop-filter: blur(10px);
    }
    h2 { text-align: center; color: #ffd54f; margin-bottom: 30px; }
    input {
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      background: rgba(255,255,255,0.1);
      border: 1px solid #4db8ff;
      border-radius: 8px;
      color: white;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 14px;
      margin: 15px 0 10px;
      border: none;
      border-radius: 8px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-login { background: linear-gradient(90deg, #0a4fa3, #1e7ee8); color: white; }
    .message {
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      margin: 10px 0;
      display: none;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>🔑 ĐĂNG NHẬP NGỌC RỒNG SV4</h2>
  
  <div id="msg" class="message"></div>

  <!-- Form đăng nhập -->
  <form action="https://nro1999.online/sv4/dangnhap.php" method="POST">
    <input type="text" name="username" placeholder="Tên đăng nhập" required>
    <input type="password" name="password" placeholder="Mật khẩu" required>
    <button type="submit" class="btn-login">Đăng Nhập</button>
  </form>

  <p style="text-align:center; margin-top:20px;">
    Chưa có tài khoản? 
    <a href="#" onclick="alert('Bạn có thể đăng ký trực tiếp trên game hoặc trang chính thức!')" style="color:#ffd54f;">
      Đăng ký ngay
    </a>
  </p>
</div>

</body>
</html>
